# TECH_DESIGN §1 — 로컬 개발: FastAPI(api) + PostgreSQL 16
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo}
      POSTGRES_DB: ${POSTGRES_DB:-todo_reward}
    ports:
      # 호스트 5432는 다른 로컬 프로젝트가 점유 → 5434로 노출. 컨테이너 내부는 5432 유지.
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # api가 db 준비 완료 후 뜨도록. pg_trgm 등 확장은 마이그레이션에서 생성.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo} -d ${POSTGRES_DB:-todo_reward}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      # core/config.py가 읽는 값. 컨테이너 내부에서는 db 호스트명으로 접속.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-todo}:${POSTGRES_PASSWORD:-todo}@db:5432/${POSTGRES_DB:-todo_reward}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CRON_SECRET: ${CRON_SECRET:-dev-cron-secret}
    ports:
      # 호스트 8000은 다른 로컬 프로젝트가 점유 → 8001로 노출.
      - "8001:8000"
    volumes:
      # 로컬 개발 편의: 코드 변경 시 --reload 반영.
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
